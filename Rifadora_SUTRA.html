<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rifa · 30 Aniversario SUTRA (v24)</title>
<style>
  :root{--apple:#8BC34A;--emerald:#50C878;--gold:#D4AF37;--ink:#102a43;--paper:#f9fafb;}
  *{box-sizing:border-box} 
  body{margin:0;font-family:Segoe UI,system-ui,-apple-system,Roboto,Arial,sans-serif;
  color:var(--ink);background:linear-gradient(120deg,#eef7ea,#f7fff2);min-height:100vh;display:flex}
  .wrap{flex:1;display:grid;grid-template-columns:1fr 360px;gap:16px;padding:16px;min-height:0}
  header.brand{grid-column:1/-1;display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--apple),var(--emerald));
  color:#fff;padding:12px 20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08),inset 0 0 0 2px rgba(255,255,255,.2)}
  .medal{width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff8,#0000 40%),linear-gradient(135deg,#f6e27a,var(--gold));
  display:grid;place-items:center;font-weight:800;box-shadow:0 6px 16px rgba(0,0,0,.15),inset 0 0 0 2px rgba(255,255,255,.35)}
  .brand h1{margin:0;font-size:clamp(1.1rem,2.2vw,1.6rem);font-weight:800}
  .panel{background:var(--paper);border:1px solid #e6e6e6;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.06);display:flex;flex-direction:column;min-height:0}
  .main{padding:18px;padding-bottom:120px;display:flex;flex-direction:column;gap:12px;min-height:0}
  .namebox{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:6px;overflow:hidden; justify-content: center;}
  .bigname{transition:transform .25s ease, filter .25s ease;font-size:clamp(2rem,6vw,4.8rem);font-weight:900;text-align:center;padding:16px 22px;border-radius:22px;background:linear-gradient(135deg,#fff,#f5fff0);
  border:1px solid #e5eddc;min-height:3.5em;max-height:40vh;overflow:auto;display:grid;place-items:center;word-break:break-word}
  .meta{font-size:1.1rem;opacity:.85;text-align:center;font-weight:600;color:#2c5e31}
  .statsbar{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:2px 0;font-size:.9rem;}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
  .chip{background:linear-gradient(135deg,#fff,#eef8e9);border:1px solid #e1eada;border-radius:999px;padding:6px 10px;font-weight:600}
  .controls{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:center;text-align:center;padding:14px 18px;border-radius:16px;background:rgba(255,255,255,.92);border:1px solid #e6e6e6;box-shadow:0 14px 30px rgba(0,0,0,.15);pointer-events:auto;backdrop-filter:blur(10px);}
  button{padding:12px 18px;border:none;border-radius:12px;font-weight:800;cursor:pointer;letter-spacing:.3px;font-size:1rem; transition:transform 0.1s}
  button:active{transform:scale(0.96)}
  button:disabled{opacity:0.5;cursor:not-allowed}
  .primary{background:linear-gradient(135deg,var(--apple),var(--emerald));color:#fff;box-shadow:0 8px 18px rgba(80,200,120,.35)}
  .secondary{background:linear-gradient(135deg,#fff,#f7efe3);color:#5b4636;border:1px solid #ecd4a1}
  .danger{background:linear-gradient(135deg,#fff,#ffefef);color:#7b3b3b;border:1px solid #f0c7c7}
  .side{background:#fff;border:1px solid #e6e6e6;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.06);display:flex;flex-direction:column;min-height:0}
  .side header{padding:14px 16px;background:linear-gradient(135deg,#f4fff0,#ffffff);border-bottom:1px solid #e6f0e2;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .badge{padding:4px 8px;border-radius:999px;background:linear-gradient(135deg,#fff9e6,#fff3c4);border:1px solid #f0dfaa;font-size:.75rem;color:#6b4d18;font-weight:800}
  .stor{flex:1 1 auto;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .stor-item{padding:10px 12px;border-radius:10px;border:1px solid #e8eddc;background:#ffffff;font-weight:700;display:flex;align-items:center;gap:8px;justify-content:space-between; animation:fadeIn 0.3s ease}
  @keyframes fadeIn { from{opacity:0; transform:translateY(-10px)} to{opacity:1; transform:translateY(0)} }
  @media (max-width:960px){.wrap{grid-template-columns:1fr}}
</style>
</head>

  // Filtro silencioso de prevención: Se asegura de que todas las claves sean únicas.
  const PEOPLE = [];
  const vistas = new Set();
  RAW_PEOPLE.forEach(p => {
    let claveFinal = p.clave;
    let sufijo = 1;
    while(vistas.has(claveFinal)){
      claveFinal = p.clave + '-' + sufijo;
      sufijo++;
    }
    vistas.add(claveFinal);
    PEOPLE.push({...p, clave: claveFinal});
  });

  const errorBox = document.getElementById('errorBox');
  function showError(msg){
    if(!errorBox) return;
    errorBox.style.display = 'block';
    errorBox.textContent = '⚠️ Error: ' + msg;
  }
  
  window.addEventListener('error', (e)=>{ showError(e.message || 'Error desconocido'); });
  window.addEventListener('unhandledrejection', (e)=>{ showError((e.reason && e.reason.message) ? e.reason.message : String(e.reason || 'Promise rechazada')); });
  
  function safe(fn){
    return function(...args){ try { return fn(...args); } catch(err){ console.error(err); showError(err.message || String(err)); } }
  }

  // Sintetizador de sonido (No requiere archivos externos)
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let audioCtx;
  
  function playWinSound() {
    if(!audioCtx) audioCtx = new AudioContext();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.type = 'sine';
    // Arpegio de victoria rápido (La mayor)
    osc.frequency.setValueAtTime(880, t); // A5
    osc.frequency.setValueAtTime(1108.73, t + 0.1); // C#6
    osc.frequency.setValueAtTime(1318.51, t + 0.2); // E6
    
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.7);
    
    osc.start(t);
    osc.stop(t + 0.8);
  }

  function refreshButtons(){

  function counters(){ 
    const total = PEOPLE.length;
    const llamados = drawn.length;
    const porLlamar = remaining.length;
    
    if(statsbar){
      statsbar.innerHTML = ''
        + '<span class="chip">Total: <b>' + total + '</b></span>'
        + '<span class="chip" style="color:#2c5e31">Llamados: <b>' + llamados + '</b></span>'
        + '<span class="chip" style="color:#7b3b3b">Restantes: <b>' + porLlamar + '</b></span>';
    }
    
    if(badgeCount) badgeCount.textContent = llamados;
    refreshButtons();
  }

  function renderStorage(preserve=false){
    if(!storage) return;
    let prevTop = storage.scrollTop, prevH = storage.scrollHeight;
    storage.innerHTML = '';
    
    for(let i=0; i<drawn.length; i++){
      const p = drawn[i].person;
      const el = document.createElement('div');
      el.className = 'stor-item';
      const pos = i + 1;
      el.innerHTML = `<span>${p.name}</span><span class="badge">#${pos}</span>`;
      storage.insertBefore(el, storage.firstChild);
    }
    
    if(preserve){
      let delta = storage.scrollHeight - prevH;
      storage.scrollTop = Math.max(0, prevTop + delta);
    }
  }

  function starBurst(){
    const N = 30;
    for(let i=0;i<N;i++){
      const s = document.createElement('div');
      s.textContent = (i%3===0)?'✦':'★';
      s.style.position='fixed';
      s.style.left = (50 + (Math.random()*40-20)) + '%';
      s.style.top = (35 + (Math.random()*20-10)) + '%';
      s.style.fontSize = (14 + Math.random()*30) + 'px';
      s.style.opacity = 1;
      s.style.pointerEvents = 'none';
      s.style.userSelect = 'none';
      s.style.zIndex = 999;
      s.style.transition = 'transform 1000ms cubic-bezier(0.25, 1, 0.5, 1), opacity 1000ms ease';
      s.style.color = (i % 2 === 0) ? '#D4AF37' : '#50C878';
      s.style.textShadow = '0 0 8px rgba(255,255,255,0.8)';
      document.body.appendChild(s);
      const dx = (Math.random()*300-150);
      const dy = - (80 + Math.random()*180);
      requestAnimationFrame(()=>{
        s.style.transform = `translate(${dx}px, ${dy}px) rotate(${(Math.random()*90-45)}deg) scale(${Math.random()*1.5})`;
        s.style.opacity = 0;
      });
      setTimeout(()=> s.remove(), 1050);
    }
  }

  function drawOne(){
    if(remaining.length===0){ 
      bigname.textContent='🎉 ¡Lista completa!'; 
      metainfo.textContent=''; 
      refreshButtons(); 
      return; 
    }
    
    playWinSound();
    
    const idx = Math.floor(Math.random()*remaining.length);
    const person = remaining.splice(idx,1)[0];
    
    // Guardamos el índice original para el Deshacer Perfecto
    drawn.push({ person: person, originalIndex: idx });
    
    bigname.textContent = person.name;
    bigname.style.transform='scale(1.04)'; 
    bigname.style.filter='drop-shadow(0 12px 24px rgba(80,200,120,.3))'; 
    setTimeout(()=>{
      bigname.style.transform='scale(1)'; 
      bigname.style.filter='none';
    }, 350);
    
    metainfo.textContent = `Clave: ${person.clave || '—'}${person.dept ? ' · Departamento: ' + person.dept : ''}`;
    
    starBurst();
    counters();
    renderStorage(true);
    storage.scrollTop = 0;
  }

  function undoLast(){
    if(drawn.length===0) return;
    const lastDraw = drawn.pop();
    
    // Deshacer Perfecto: Reinserta a la persona exactamente en el índice de donde salió
    remaining.splice(lastDraw.originalIndex, 0, lastDraw.person);
    
    bigname.textContent = '↩️ Deshecho: ' + (lastDraw.person.name||'');
    metainfo.textContent = 'El trabajador ha vuelto a la tómbola';
    counters();
    renderStorage(true);
  }

  function resetAll(){
    if(!confirm('¿Reiniciar la rifa completa?')) return;
    remaining = [...PEOPLE]; 
    drawn = [];
    bigname.textContent = '— Presiona “Sortear nombre” —';
    metainfo.textContent = '';
    counters();
    renderStorage(true);
    storage.scrollTop = 0;
  }

  btnDraw.addEventListener('click', safe(drawOne));
  btnUndo.addEventListener('click', safe(undoLast));
  btnReset.addEventListener('click', safe(resetAll));
  btnTop.addEventListener('click', ()=> storage.scrollTop = 0);
  btnBottom.addEventListener('click', ()=> storage.scrollTop = storage.scrollHeight);
  
  document.addEventListener('keydown', (e)=>{ 
    if(e.code==='Space' && e.target.tagName !== 'BUTTON'){
      e.preventDefault();
      safe(drawOne)();
    } 
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){
      e.preventDefault();
      safe(undoLast)();
    } 
  });

  counters();
  renderStorage();
</script>
</body>
</html>
